<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid</title>
    <style>
        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --text: #1c1e21;
            --muted: #6b7280;
            --accent: #4caf50;
            --accent-hover: #3d9140;
            --border: #d1d5db;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #16181c;
                --surface: #22262c;
                --text: #e6e8eb;
                --muted: #9aa0a6;
                --accent: #4caf50;
                --accent-hover: #5cbf60;
                --border: #3a3f46;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 2rem 1rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            max-width: 640px;
            margin-bottom: 1.5rem;
        }

        header h1 {
            margin: 0 0 0.25rem;
            font-size: 2rem;
            font-weight: 700;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        #toolbar-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            margin: 0 0 1.5rem;
        }

        #fileInput {
            font-size: 1rem;
            color: var(--text);
        }

        #fileInput::file-selector-button {
            padding: 0.55rem 1rem;
            margin-right: 0.75rem;
            font-size: 1rem;
            color: var(--text);
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        #fileInput::file-selector-button:hover {
            border-color: var(--accent);
        }

        #downloadBtn {
            padding: 0.6rem 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.05s ease;
        }

        #downloadBtn:hover {
            background-color: var(--accent-hover);
        }

        #downloadBtn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        #downloadBtn:active {
            transform: translateY(1px);
        }

        #canvas-container {
            position: relative;
            display: inline-block;
            margin: 0 0 1.5rem;
        }

        #message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            font-size: 1.25rem;
            color: var(--muted);
            pointer-events: none;
        }

        #canvas {
            border: 2px dashed var(--border);
            border-radius: 12px;
            background-color: var(--surface);
            transition: border-color 0.3s ease;
            cursor: pointer;
        }

        #canvas.drag-over {
            border-color: var(--accent);
        }

        footer {
            margin-top: auto;
            padding-top: 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        footer a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
<header>
    <h1>Image Grid</h1>
    <p>Arrange up to 8 images in a tidy 2&times;4 grid, reorder them by dragging, and download the result.</p>
</header>
<div id="toolbar-container">
    <input type="file" id="fileInput" multiple accept="image/*">
    <button id="downloadBtn">Download Combined Image</button>
</div>
<div id="canvas-container">
    <div id="message-container">You can also drag and drop up to 8 images into this area!</div>
    <canvas id="canvas"></canvas>
</div>
<footer>
    <a href="https://github.com/toabi/imagegrid">Source</a>
</footer>
<script src="script.js"></script>
</body>
</html>
